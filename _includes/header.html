<header class="site-header" id="site-header" role="banner">
  <div class="container">

    <a href="{{ '/' | relative_url }}" class="header-logo" aria-label="MasiniRO">
      <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="MasiniRO" width="130" height="36" loading="eager">
    </a>

    <!-- Desktop nav -->
    <nav class="header-nav-desktop" aria-label="Navigare">
      {%- assign cur = page.url -%}
      <a href="{{ '/' | relative_url }}"            {% if cur == '/' %}class="active"{% endif %}>Acasă</a>
      <a href="{{ '/stiri/' | relative_url }}"       {% if cur contains '/stiri' %}class="active"{% endif %}>Știri</a>
      <a href="{{ '/test-drive/' | relative_url }}"  {% if cur contains '/test-drive' %}class="active"{% endif %}>Test Drive</a>
      <a href="{{ '/second-hand/' | relative_url }}" {% if cur contains '/second-hand' %}class="active"{% endif %}>Second Hand</a>
      <a href="{{ '/electrice/' | relative_url }}"   {% if cur contains '/electrice' %}class="active"{% endif %}>Electrice</a>
      <a href="{{ '/motoare/' | relative_url }}"     {% if cur contains '/motoare' %}class="active"{% endif %}>Motoare</a>
      <a href="{{ '/dezmembrari/' | relative_url }}" {% if cur contains '/dezmembrari' %}class="active"{% endif %}>Dezmembrări</a>
      <a href="{{ '/orase/' | relative_url }}"       {% if cur contains '/orase' %}class="active"{% endif %}>Orașe</a>
    </nav>

    <div class="header-actions">
      <button class="header-search-btn" id="search-btn" aria-label="Caută">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="header-burger" id="header-burger" aria-label="Meniu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>
</header>

<!-- MOBILE NAV — în afara header, deasupra oricărui conținut -->
<div class="mobile-nav-overlay" id="mobile-nav-overlay" aria-hidden="true">
  <nav class="mobile-nav-inner">
    {%- assign cur = page.url -%}
    <a href="{{ '/' | relative_url }}"            {% if cur == '/' %}class="active"{% endif %}>
      <span class="mn-icon">🏠</span> Acasă
    </a>
    <a href="{{ '/stiri/' | relative_url }}"       {% if cur contains '/stiri' %}class="active"{% endif %}>
      <span class="mn-icon">📰</span> Știri Auto
    </a>
    <a href="{{ '/test-drive/' | relative_url }}"  {% if cur contains '/test-drive' %}class="active"{% endif %}>
      <span class="mn-icon">🚗</span> Test Drive
    </a>
    <a href="{{ '/second-hand/' | relative_url }}" {% if cur contains '/second-hand' %}class="active"{% endif %}>
      <span class="mn-icon">🔍</span> Second Hand
    </a>
    <a href="{{ '/electrice/' | relative_url }}"   {% if cur contains '/electrice' %}class="active"{% endif %}>
      <span class="mn-icon">⚡</span> Electrice
    </a>
    <a href="{{ '/motoare/' | relative_url }}"     {% if cur contains '/motoare' %}class="active"{% endif %}>
      <span class="mn-icon">🔧</span> Motoare & Tuning
    </a>
    <a href="{{ '/dezmembrari/' | relative_url }}" {% if cur contains '/dezmembrari' %}class="active"{% endif %}>
      <span class="mn-icon">🔩</span> Dezmembrări
    </a>
    <a href="{{ '/orase/' | relative_url }}"       {% if cur contains '/orase' %}class="active"{% endif %}>
      <span class="mn-icon">📍</span> Orașe
    </a>
    <a href="{{ '/arhiva/' | relative_url }}"      {% if cur contains '/arhiva' %}class="active"{% endif %}>
      <span class="mn-icon">📚</span> Toate articolele
    </a>
  </nav>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true">
  <div class="search-box">
    <input type="search" id="search-input" placeholder="Caută articole..." autocomplete="off">
    <p class="search-hint">Apasă <kbd>ESC</kbd> pentru a închide</p>
  </div>
</div>
