title: "MasiniRO"
tagline: "Știri și teste auto din România"
description: "Cel mai actualizat blog auto din România — știri, teste drive, sfaturi și noutăți auto pentru șoferii români."
url: "https://masiniro.github.io"
baseurl: ""
lang: "ro"
locale: "ro_RO"
timezone: "Europe/Bucharest"

author:
  name: "MasiniRO"
  email: "contact@masiniro.ro"
  url: "https://masiniro.github.io"

logo: "/assets/images/favicon.svg"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

markdown: kramdown
highlighter: rouge
permalink: /articole/:year/:month/:day/:title/

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - scripts/
  - "*.zip"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "MasiniRO"
      image: "/assets/images/default-og.svg"

paginate: 12
paginate_path: "/arhiva/pagina/:num/"

feed:
  path: /feed.xml
  posts_limit: 20

twitter:
  username: masiniro
  card: summary_large_image

social:
  name: MasiniRO
  links:
    - https://facebook.com/masiniro
    - https://instagram.com/masiniro

collections:
  posts:
    output: true

# Security note: GitHub Pages sets HSTS + TLS automatically.
# CSP, X-Frame-Options, X-Content-Type-Options, Referrer-Policy and
# Permissions-Policy are set via <meta> tags in _includes/head.html
