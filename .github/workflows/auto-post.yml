name: Auto-Post MasiniRO cu Claude AI

on:
  schedule:
    # Rulează în fiecare zi la 08:00 ora României (06:00 UTC)
    - cron: '0 6 * * *'
  # Permite trigger manual din GitHub Actions
  workflow_dispatch:
    inputs:
      topic:
        description: 'Subiect specific (opțional)'
        required: false
        default: ''
      category:
        description: 'Categorie articol'
        required: false
        default: 'Știri'
        type: choice
        options:
          - Știri
          - Teste
          - Sfaturi
          - Electrice
          - Second Hand

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-frontmatter

      - name: Validate inputs
        run: |
          TOPIC_INPUT="${{ github.event.inputs.topic }}"
          # Reject if topic contains shell metacharacters
          if echo "$TOPIC_INPUT" | grep -qP '[;&|`$(){}\[\]<>!\\]'; then
            echo "❌ TOPIC input contine caractere nepermise"
            exit 1
          fi
          # Limit length
          if [ ${#TOPIC_INPUT} -gt 200 ]; then
            echo "❌ TOPIC prea lung (max 200 caractere)"
            exit 1
          fi
          echo "✅ Input valid"

      - name: Generate article with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
          CATEGORY: ${{ github.event.inputs.category || 'Știri' }}
        run: python scripts/generate_post.py

      - name: Commit and push new post
        run: |
          git config --local user.email "masiniro-bot@users.noreply.github.com"
          git config --local user.name "MasiniRO Bot"
          git add _posts/
          git diff --staged --quiet || git commit -m "🚗 Auto-post: $(date +'%Y-%m-%d')"
          git push
